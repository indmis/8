<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>?</title>

<style>

html,body{
margin:0;
padding:0;
background:white;
height:100%;
font-family:Arial, sans-serif;
}

#container{
width:100vw;
height:100vh;
display:grid;
grid-template-columns: repeat(5,1fr);
grid-template-rows: repeat(6,1fr);
justify-items:center;
align-items:center;
}

.q{
font-size:clamp(32px,6vw,60px);
cursor:pointer;
user-select:none;
padding:14px;
border-radius:10px;
transition:background 0.2s, opacity 1.5s;
}

.correct{
background:#ccc;
}

.fade{
opacity:0;
pointer-events:none;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
20%{transform:translateX(-6px)}
40%{transform:translateX(6px)}
60%{transform:translateX(-4px)}
80%{transform:translateX(4px)}
100%{transform:translateX(0)}
}

#qr{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
transition:opacity 2s;
max-width:70vw;
}

#qr.show{
opacity:1;
}

</style>
</head>

<body>

<div id="container"></div>
<img id="qr" src="image_qr.png">

<script>

const AudioContext = window.AudioContext || window.webkitAudioContext
const audioCtx = new AudioContext()

function playTone(freq){

const osc = audioCtx.createOscillator()
const gain = audioCtx.createGain()

osc.type="sine"
osc.frequency.value=freq

gain.gain.setValueAtTime(0.0001,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.4,audioCtx.currentTime+0.02)
gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.5)

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start()
osc.stop(audioCtx.currentTime+0.5)

}

function playNoise(){

const bufferSize = audioCtx.sampleRate * 0.5
const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate)
const data = buffer.getChannelData(0)

for(let i=0;i<bufferSize;i++){
data[i] = Math.random()*2-1
}

const noise = audioCtx.createBufferSource()
noise.buffer = buffer

const gain = audioCtx.createGain()
gain.gain.value = 0.3

noise.connect(gain)
gain.connect(audioCtx.destination)

noise.start()

}

const notes = [
{note:"C4",freq:261.63},
{note:"D4",freq:293.66},
{note:"E4",freq:329.63},
{note:"F4",freq:349.23},
{note:"G4",freq:392.00},
{note:"A4",freq:440.00},
{note:"B4",freq:493.88}
]

const sequence=["C4","D4","E4","F4","G4","A4","B4"]

let progress=0

let items=[]

for(let i=0;i<26;i++){

if(i<7){
items.push({type:"note",note:notes[i].note,freq:notes[i].freq})
}else{
items.push({type:"noise"})
}

}

items.sort(()=>Math.random()-0.5)

const container=document.getElementById("container")

items.forEach(item=>{

const el=document.createElement("div")
el.className="q"
el.textContent="?"

el.dataset.type=item.type
if(item.note) el.dataset.note=item.note
if(item.freq) el.dataset.freq=item.freq

container.appendChild(el)

el.addEventListener("click",()=>handleClick(el))

})

function handleClick(el){

audioCtx.resume()

const type=el.dataset.type
const note=el.dataset.note

if(type==="note"){
playTone(parseFloat(el.dataset.freq))
}else{
playNoise()
}

if(note===sequence[progress]){

el.classList.add("correct")

setTimeout(()=>el.classList.remove("correct"),300)

progress++

if(progress===sequence.length){
victory()
}

}else{

document.querySelectorAll(".q").forEach(q=>{
q.classList.add("shake")
setTimeout(()=>q.classList.remove("shake"),400)
})

progress=0

}

}

function victory(){

document.querySelectorAll(".q").forEach(q=>{
q.classList.add("fade")
})

setTimeout(()=>{
document.getElementById("qr").classList.add("show")
},1200)

}

</script>

</body>
</html>
