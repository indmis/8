<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>?</title>

<style>

html,body{
margin:0;
padding:0;
background:white;
overflow:hidden;
font-family:Arial, sans-serif;
height:100%;
}

#container{
position:relative;
width:100vw;
height:100vh;
}

.q{
position:absolute;
font-size:clamp(30px,6vw,60px);
color:black;
cursor:pointer;
user-select:none;
transition:background 0.2s, opacity 1.5s;
padding:10px;
border-radius:8px;
}

.correct{
background:#ccc;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
20%{transform:translateX(-6px)}
40%{transform:translateX(6px)}
60%{transform:translateX(-4px)}
80%{transform:translateX(4px)}
100%{transform:translateX(0)}
}

.fade{
opacity:0;
pointer-events:none;
}

#qr{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
transition:opacity 2s;
max-width:70vw;
}

#qr.show{
opacity:1;
}

</style>
</head>

<body>

<div id="container"></div>

<img id="qr" src="image_qr.png">

<script>

const AudioContext = window.AudioContext || window.webkitAudioContext
const audioCtx = new AudioContext()

function playTone(freq){

const osc = audioCtx.createOscillator()
const gain = audioCtx.createGain()

osc.type = "sine"
osc.frequency.value = freq

gain.gain.setValueAtTime(0.0001,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.4,audioCtx.currentTime+0.02)
gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.5)

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start()
osc.stop(audioCtx.currentTime+0.5)

}

const notes = [
{note:"C4",freq:261.63},
{note:"D4",freq:293.66},
{note:"E4",freq:329.63},
{note:"F4",freq:349.23},
{note:"G4",freq:392.00},
{note:"A4",freq:440.00},
{note:"B4",freq:493.88}
]

const sequence = ["C4","D4","E4","F4","G4","A4","B4"]

let progress = 0

const container = document.getElementById("container")

let items = []

for(let i=0;i<26;i++){

let freq
let note=null

if(i<7){
freq=notes[i].freq
note=notes[i].note
}else{
freq = 200 + Math.random()*600
}

items.push({freq,note})

}

items.sort(()=>Math.random()-0.5)

items.forEach((item,i)=>{

const el = document.createElement("div")
el.className="q"
el.textContent="?"

const margin = 80

const x = Math.random()*(window.innerWidth-margin)
const y = Math.random()*(window.innerHeight-margin)

el.style.left=x+"px"
el.style.top=y+"px"

el.dataset.freq=item.freq
el.dataset.note=item.note

container.appendChild(el)

el.addEventListener("click",()=>handleClick(el))

})

function handleClick(el){

audioCtx.resume()

const freq = parseFloat(el.dataset.freq)
const note = el.dataset.note

playTone(freq)

if(note === sequence[progress]){

el.classList.add("correct")

setTimeout(()=>{
el.classList.remove("correct")
},300)

progress++

if(progress === sequence.length){
victory()
}

}else{

document.querySelectorAll(".q").forEach(q=>{
q.classList.add("shake")
setTimeout(()=>q.classList.remove("shake"),400)
})

progress = 0

}

}

function victory(){

document.querySelectorAll(".q").forEach(q=>{
q.classList.add("fade")
})

setTimeout(()=>{
document.getElementById("qr").classList.add("show")
},1200)

}

</script>

</body>
</html>
